<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRICK BREAKER</title>
    <link rel="icon" type="image/x-icon" href="22.png">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    font-family: "Silkscreen";
    height: 100vh;
    background-image: url('w3.png'); 
    background-size: cover;
    background-position: center;
    display: flex;
    justify-content: center;
    align-items: center;
}

.start-container {
    text-align: center;
    height: 275px;
    width: 375px;
    font-size: 20px;
    font-family: "Silkscreen";
    color:  rgb(255, 240, 180); 
    background: rgba(255, 255, 255, 0.1); 
    padding: 50px;
    border-radius: 30px;
    margin-bottom: 1px;
}

h1, h2 {
    font-family: "Silkscreen", sans-serif;
    color: rgb(255, 240, 180); 
    text-align: center;
    font-weight: bold;
    text-shadow:
        0 0 5px rgba(255, 255, 255, 0.6), 
        0 0 10px rgba(255, 255, 255, 0.4), 
        0 0 15px rgba(255, 223, 100, 0.3), 
        0 0 20px rgba(255, 223, 100, 0.2); 
    animation: shineAnimation 3s ease-in-out infinite alternate; 
}

@keyframes shineAnimation {
    0% {
        text-shadow: 
            0 0 5px rgba(255, 255, 255, 0.6),
            0 0 10px rgba(255, 255, 255, 0.4),
            0 0 15px rgba(255, 223, 100, 0.3),
            0 0 20px rgba(255, 223, 100, 0.2);
    }
    100% {
        text-shadow: 
            0 0 10px rgba(255, 255, 255, 0.8),
            0 0 15px rgba(255, 255, 255, 0.6),
            0 0 25px rgba(255, 223, 100, 0.4),
            0 0 30px rgba(255, 223, 100, 0.3);
    }
}


.restart-button {
    position: relative;
    font-family: "Silkscreen";
    border: none;
    background: rgb(240, 151, 185);
    background: linear-gradient(0deg, rgb(245, 176, 203) 0%, rgb(196, 149, 167) 100%);
    color: rgb(255, 240, 180);
    font-size: 18px;
    font-weight: bold;
    padding: 1em 3em;
    border-radius: 1em;
    outline: none;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 0 10px rgb(255, 240, 180), 0 0 15px rgba(234, 76, 137, 0.5);
    transition: all 0.3s ease-in-out;
    margin-top: 30px;
}


.restart-button:hover {
    color: rgb(255, 240, 180);
    opacity: 0.8;
    box-shadow: 0 0 20px rgba(251, 33, 117, 0.7), 0 0 30px rgba(234, 76, 137, 0.6);
}

.restart-button:before {
    position: absolute;
    content: '';
    display: inline-block;
    top: -180px;
    left: 0;
    width: 30px;
    height: 100%;
    background-color:rgb(255, 240, 180);
    animation: shiny-btn1 3s ease-in-out infinite;
}

.restart-button:active {
    box-shadow: 
    4px 4px 10px rgba(255, 255, 255, 0.4),
    -4px -4px 10px rgba(116, 125, 136, 0.3), 
    inset -4px -4px 6px rgba(255, 255, 255, 0.2),
    inset 4px 4px 6px rgba(0, 0, 0, 0.2);
}


@keyframes shiny-btn1 {
    0% { 
        -webkit-transform: scale(0) rotate(45deg);
        opacity: 0;
    }
    80% { 
        -webkit-transform: scale(0) rotate(45deg); 
        opacity: 0.4;
    }
    81% { 
        -webkit-transform: scale(4) rotate(45deg); 
        opacity: 1; 
    }
    100% { 
        -webkit-transform: scale(50) rotate(45deg); 
        opacity: 0; 
    }
}

.footer {
  position: fixed;
  bottom: 8px;
  width: 100%;
  text-align: center;
  font-size: 14px;
  color: rgba(231, 206, 255, 0.4);
  padding: 10px;
}

</style>
</head>

<body>
    <div class="start-container">
    <h1>YOU WIN!</h1>
    <h2>Congratulations</h2>
    <button class="restart-button" onclick="startGame()">RESTART &gt;</button>
    </div>

    <audio id="background-sound" src="01. Ground Theme.mp3" preload="auto"></audio>

    <script>
    function startGame() {
        let audio = document.getElementById("background-sound");
        audio.play();
        localStorage.setItem("audioPlaying", "true");
        setTimeout(function() {
             window.location.href = 'brickbreaker1.html'; 
        }, 500);
    }

 </script>

<footer class="footer">
    <p>&copy; 2025 Brick Breaker Game</p>
</footer>

</body>
</html>
